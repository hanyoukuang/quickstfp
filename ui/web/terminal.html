<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>xterm</title>

    <link rel="stylesheet" href="./xterm/xterm.min.css"/>
    <script src="./xterm/xterm.min.js"></script>
    <script src="./xterm/xterm-addon-fit.min"></script>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>

    <style>
        html, body {
            margin: 0;
            height: 100%;
            background: black;
        }

        #terminal {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
<div id="terminal"></div>

<script>
    const term = new Terminal({
        cursorBlink: true,
        fontSize: 14
    });
    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('terminal'));

    let bridge = null;

    function resizeTerminal() {
        fitAddon.fit();
        if (bridge) {
            bridge.resize(term.cols, term.rows);
        }
    }

    new QWebChannel(qt.webChannelTransport, channel => {
        bridge = channel.objects.bridge;

        term.onData(data => {
            bridge.on_input(data);
        });

        bridge.output.connect(text => {
            term.write(text);
        });

        // 【核心修复】：先计算当前终端的行列数，然后再传给 Python 后端
        fitAddon.fit();
        const cols = term.cols || 80;
        const rows = term.rows || 24;

        // 这里的 cols 和 rows 会对应 Python 中 @Slot(int, int) 的两个参数
        bridge.start(cols, rows);
    });

    window.addEventListener("resize", resizeTerminal);
    let wheelAccumulator = 0; // 用于妙控鼠标/触控板的高精度累加

    window.addEventListener('wheel', (e) => {
        // 判断是否按住了 Ctrl (Windows) 或 Command (Mac)
        if (e.ctrlKey || e.metaKey) {
            e.preventDefault(); // 阻止浏览器默认的整个网页缩放行为

            // 累加滚轮偏移量（普通鼠标单次 e.deltaY 通常是 100 左右，妙控鼠标是几到几十）
            wheelAccumulator += e.deltaY;

            // 设置一个阈值(比如 50)，累积到了才改变字号，让妙控鼠标非常丝滑
            if (Math.abs(wheelAccumulator) >= 50) {
                // e.deltaY 为正代表向下滚（缩小），为负代表向上滚（放大）
                let step = wheelAccumulator > 0 ? -1 : 1;
                wheelAccumulator = 0; // 触发后重置累加器

                let currentSize = term.options.fontSize;
                let newSize = currentSize + step;

                // 限制字号范围 8 到 48
                if (newSize >= 8 && newSize <= 48) {
                    term.options.fontSize = newSize; // 直接修改终端字号
                    fitAddon.fit();                  // 重新计算行列布局

                    // 将计算好的新行列数通过 bridge 发给 Python 后端
                    if (bridge) {
                        bridge.resize(term.cols, term.rows);
                    }
                }
            }
        }
    }, {passive: false});
</script>
</body>
</html>
