<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>xterm</title>

    <link rel="stylesheet" href="./xterm/xterm.min.css"/>
    <script src="./xterm/xterm.min.js"></script>
    <script src="./xterm/xterm-addon-fit.min"></script>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>

    <style>
        html, body {
          margin: 0;
          height: 100%;
          background: black;
        }
        #terminal {
          width: 100%;
          height: 100%;
        }
    </style>
</head>

<body>
<div id="terminal"></div>

<script>
    const term = new Terminal({
      cursorBlink: true,
      fontSize: 14
    });
    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('terminal'));

    let bridge = null;

    function resizeTerminal() {
      fitAddon.fit();                 // ① 重新计算
      const cols = term.cols;
      const rows = term.rows;

      console.log("resize:", cols, rows);

      if (bridge) {
        bridge.resize(cols, rows);    // ② 发给后端
      }
    }

    new QWebChannel(qt.webChannelTransport, channel => {
      bridge = channel.objects.bridge;

      term.onData(data => {
        bridge.on_input(data);
      });

      bridge.output.connect(text => {
        term.write(text);
      });

      resizeTerminal();               // 初始化同步
      bridge.start();
    });

    window.addEventListener("resize", resizeTerminal);
</script>
</body>
</html>
